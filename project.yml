name: OnAir
options:
  bundleIdPrefix: com.onair
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

targets:
  OnAir:
    type: application
    platform: macOS
    sources:
      - OnAir
    settings:
      base:
        INFOPLIST_FILE: OnAir/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.onair.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    entitlements:
      path: OnAir/OnAir.entitlements
  OnAirTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - OnAirTests
    dependencies:
      - target: OnAir
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
